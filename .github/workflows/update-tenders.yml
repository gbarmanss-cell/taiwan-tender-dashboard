name: Update tender data

on:
  workflow_dispatch:
  schedule:
    - cron: "20 23 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Crawl public tender data
        env:
          REQUEST_DELAY_SECONDS: "2"
          USER_AGENT: "TaiwanTenderDashboard/0.2 (+${{ github.server_url }}/${{ github.repository }})"
        run: python crawler.py --diagnostics-dir diagnostics

      - name: Export today's data
        run: python export_json.py

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tender-fetch-diagnostics
          path: diagnostics/
          if-no-files-found: warn
          retention-days: 7

      - name: Commit refreshed JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/tenders.json
          git diff --cached --quiet || git commit -m "chore: refresh tender data"
          git push
