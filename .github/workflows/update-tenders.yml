name: Validate dashboard

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "app/**"
      - "crawler.py"
      - "export_json.py"
      - "requirements.txt"
      - ".github/workflows/update-tenders.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Compile Python files
        run: python -m compileall app crawler.py export_json.py

      - name: Validate local JSON
        run: python -m json.tool docs/data/tenders.json > /dev/null

      - name: Check required dashboard files
        run: |
          test -f docs/index.html
          test -f docs/app.js
          test -f docs/style.css
          echo "Dashboard validation passed."
